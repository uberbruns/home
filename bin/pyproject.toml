[project]
name = "home-bin"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = ["textcase>=0.4"]

[project.scripts]
home = "home_cli:main"
list-applications = "list_applications:main"
list-repositories = "list_repositories:main"
list-safari-bookmarks = "list_safari_bookmarks:main"
transform-text = "transform_text:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
include = [
  "*.py",
  "lib/home/**",
  "lib/safari_bookmarks/**",
]

[tool.hatch.build.targets.wheel.sources]
"lib" = ""
